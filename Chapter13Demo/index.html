<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python in Plain English — Chapter 13 Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .bug-card { background: #1e1e2e; border: 1px solid #313244; border-radius: 8px; padding: 1.2rem; margin: 1rem 0; }
    .bug-card pre { margin: 0.5rem 0; font-family: 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; color: #cdd6f4; }
    .bug-label { font-size: 0.75rem; color: #f38ba8; font-weight: bold; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .options { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .opt-btn { background: #313244; border: 1px solid #45475a; color: #cdd6f4; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .opt-btn:hover { background: #45475a; }
    .opt-btn.correct { background: #1e3a1e; border-color: #a6e3a1; color: #a6e3a1; }
    .opt-btn.wrong { background: #3a1e1e; border-color: #f38ba8; color: #f38ba8; }
    .feedback { margin-top: 0.6rem; font-size: 0.85rem; min-height: 1.2rem; }
    .score-line { text-align: center; font-size: 1rem; margin: 1rem 0; color: #a6e3a1; }
    .subtitle { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <main class="wrapper">
    <h1Python in Plain English — Chapter 13 Demo</h1>
    <p class="subtitle">Each code snippet below contains one bug. Can you spot it?</p>
    <div class="score-line" id="score-display">Score: 0 / 3</div>
    <div id="questions"></div>
  </main>
  <script src="index.js"></script>
</body>
</html>
